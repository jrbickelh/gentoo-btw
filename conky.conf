conky.config = {
    -- Window & Wayland Settings
    out_to_wayland = true,
    own_window = true,
    own_window_type = 'desktop',
    own_window_transparent = true,
    own_window_argb_visual = true,
    double_buffer = true,

    -- Positioning & Padding
    alignment = 'top_left',
    gap_x = 30,
    gap_y = 30,
    minimum_width = 300,
    maximum_width = 300,

    -- Aesthetics & Fonts
    use_xft = true,
    font = 'JetBrains Mono:size=9',
    default_color = 'white',

    -- Drawing
    draw_shades = false,
    draw_outline = false,
    draw_borders = false,
    default_bar_width = 300,
    default_bar_height = 4,

    -- Updates
    update_interval = 1.0,
    cpu_avg_samples = 2,
    net_avg_samples = 2,
    no_buffers = true,
}

conky.text = [[
${font JetBrains Mono:bold:size=12}${time %H:%M:%S}${alignr}${time %Y-%m-%d}${font}
$hr
OS: $sysname $kernel ${alignr}Uptime: $uptime_short
Load Avg: $loadavg ${alignr}Processes: $processes

CPU Usage: ${cpu cpu0}% ${alignr}Freq: ${freq_g} GHz
${cpugraph 20,300 FFFFFF FFFFFF}

# Note: These GPU commands use nvidia-smi.
GPU Usage: ${execi 5 nvidia-smi --query-gpu=utilization.gpu --format=csv,noheader,nounits}% ${alignr}Temp: ${execi 5 nvidia-smi --query-gpu=temperature.gpu --format=csv,noheader,nounits}°C
${execbar 4 nvidia-smi --query-gpu=utilization.gpu --format=csv,noheader,nounits}

RAM Usage: $mem/$memmax ${alignr}Cached: $cached
${membar 4}

Swap Usage: $swap/$swapmax ${alignr}Pct: $swapperc%
${swapbar 4}

Root FS: ${fs_used /}/${fs_size /}
${fs_bar 4 /}

Disk Read: ${diskio_read} ${alignr}Disk Write: ${diskio_write}
${diskiograph_read 20,145 FFFFFF FFFFFF} ${alignr}${diskiograph_write 20,145 FFFFFF FFFFFF}

Net Up: ${upspeed wlan0} ${alignr}Net Down: ${downspeed wlan0}
${upspeedgraph wlan0 20,145 FFFFFF FFFFFF} ${alignr}${downspeedgraph wlan0 20,145 FFFFFF FFFFFF}

Total Up: ${totalup wlan0} ${alignr}Total Down: ${totaldown wlan0}
Active TCP Connections: ${tcp_portmon 1 65535 count}
$hr

Top by CPU${goto 160}PID${goto 210}CPU%${goto 260}MEM%
${top name 1}${goto 150}${top pid 1}${goto 200}${top cpu 1}${goto 250}${top mem 1}
${top name 2}${goto 150}${top pid 2}${goto 200}${top cpu 2}${goto 250}${top mem 2}
${top name 3}${goto 150}${top pid 3}${goto 200}${top cpu 3}${goto 250}${top mem 3}
${top name 4}${goto 150}${top pid 4}${goto 200}${top cpu 4}${goto 250}${top mem 4}
${top name 5}${goto 150}${top pid 5}${goto 200}${top cpu 5}${goto 250}${top mem 5}

$hr

Top by MEM${goto 160}PID${goto 210}CPU%${goto 260}MEM%
${top_mem name 1}${goto 150}${top_mem pid 1}${goto 200}${top_mem cpu 1}${goto 250}${top_mem mem 1}
${top_mem name 2}${goto 150}${top_mem pid 2}${goto 200}${top_mem cpu 2}${goto 250}${top_mem mem 2}
${top_mem name 3}${goto 150}${top_mem pid 3}${goto 200}${top_mem cpu 3}${goto 250}${top_mem mem 3}
${top_mem name 4}${goto 150}${top_mem pid 4}${goto 200}${top_mem cpu 4}${goto 250}${top_mem mem 4}
${top_mem name 5}${goto 150}${top_mem pid 5}${goto 200}${top_mem cpu 5}${goto 250}${top_mem mem 5}
]]
